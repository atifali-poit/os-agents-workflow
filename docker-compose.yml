services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/igate123
    volumes:
      - neo4j-data:/data

  temporal-postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      - temporal-postgresql
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:3001

  backend:
    build:
      context: ./backend
    depends_on:
      - neo4j
      - temporal
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: sqlite:////app/data/igate_os.db
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: igate-os-task-queue
      TEMPORAL_ENABLED: "true"
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: igate123
    volumes:
      - backend-sqlite:/app/data
    command: >
      sh -c "python -m app.seed.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 9000"

  temporal-worker:
    build:
      context: ./backend
    depends_on:
      - temporal
      - backend
    environment:
      DATABASE_URL: sqlite:////app/data/igate_os.db
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: igate-os-task-queue
      TEMPORAL_ENABLED: "true"
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: igate123
    volumes:
      - backend-sqlite:/app/data
    command: sh -c "sleep 10 && python -m app.temporal.worker"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"

volumes:
  backend-sqlite:
  neo4j-data:
  temporal-postgres-data:
